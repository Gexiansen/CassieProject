<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>我的小账本 🐷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  background:linear-gradient(180deg,#eef2ff 0%,#fdf2f8 50%,#ecfeff 100%);min-height:100vh;color:#334155;}
.wrap{max-width:640px;margin:0 auto;padding:16px 16px 120px;}
/* header */
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.top-actions{display:flex;align-items:center;gap:8px;}
.data-button{min-width:58px;height:44px;padding:0 9px;display:flex;align-items:center;justify-content:center;gap:4px;border:2px solid #e2e8f0;background:#fff;color:#64748b;border-radius:14px;font-size:16px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04);font-family:inherit;}
.data-button span{font-size:11px;font-weight:800;}
.logo{display:flex;align-items:center;gap:10px;}
.logo .pig{background:#fff;color:#6366f1;padding:8px;border-radius:16px;border:2px solid #c7d2fe;font-size:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.logo h1{font-size:20px;font-weight:800;color:#475569;}
/* summary card */
.card-sum{position:relative;color:#fff;border-radius:24px;padding:24px;margin-bottom:16px;overflow:hidden;
  background:linear-gradient(135deg,#818cf8 0%,#a78bfa 50%,#f472b6 100%);box-shadow:0 10px 25px rgba(129,140,248,.35);}
.blob{position:absolute;border-radius:50%;background:rgba(255,255,255,.13);}
.big{text-align:center;margin-bottom:16px;position:relative;}
.big .t{color:rgba(255,255,255,.8);font-size:12px;font-weight:600;margin-bottom:4px;}
.big .n{font-size:36px;font-weight:800;letter-spacing:-1px;}
.duo{display:grid;grid-template-columns:1fr 1fr;gap:12px;position:relative;}
.mini{background:rgba(255,255,255,.2);border-radius:16px;padding:12px;}
.mini .h{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.9);font-weight:600;margin-bottom:6px;}
.mini .v{font-size:18px;font-weight:800;}
.mini .v.lg{font-size:20px;}
.pill{display:inline-flex;align-items:center;gap:2px;font-weight:800;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.12);}
.pill.big-pill{font-size:20px;padding:4px 10px;border-radius:12px;}
.pill.up{background:#ef4444;color:#fff;}
.pill.down{background:#10b981;color:#fff;}
.pill.flat{background:rgba(255,255,255,.8);color:#64748b;}
/* tabs */
.tabs{display:flex;gap:6px;margin-bottom:16px;}
.tabs button{flex:1;min-height:44px;display:flex;align-items:center;justify-content:center;gap:4px;padding:10px 6px;border-radius:16px;font-size:13px;
  font-weight:700;border:2px solid #e2e8f0;background:#fff;color:#94a3b8;cursor:pointer;font-family:inherit;}
.tabs button.on{background:#6366f1;color:#fff;border-color:#6366f1;}
.compact-period{display:flex;align-items:center;gap:8px;background:#fff;border:2px solid #f1f5f9;border-radius:18px;padding:8px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.compact-period .period-label{flex:1;text-align:center;color:#475569;font-size:14px;font-weight:800;}
.compact-period button{min-width:44px;min-height:44px;border:none;background:#f8fafc;color:#64748b;border-radius:12px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;}
.compact-period .view-toggle{display:flex;background:#f1f5f9;border-radius:12px;padding:3px;}
.compact-period .view-toggle button{min-width:44px;min-height:44px;background:none;font-size:12px;}
.compact-period .view-toggle button.on{background:#6366f1;color:#fff;}
.compact-period .today{min-width:44px;min-height:44px;padding:0 8px;color:#6366f1;background:#eef2ff;font-size:11px;}
/* generic card */
.card{background:#fff;border-radius:24px;padding:20px;border:2px solid #f1f5f9;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:16px;}
.card h3{font-weight:800;color:#475569;display:flex;align-items:center;gap:6px;margin-bottom:14px;font-size:16px;}
.card h3 .sub{font-size:12px;font-weight:500;color:#94a3b8;}
.empty{text-align:center;color:#cbd5e1;padding:32px 0;font-weight:600;font-size:14px;}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
/* bars */
.bar-item{margin-bottom:10px;}
.bar-item .row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px;}
.bar-item .row .l{color:#475569;font-weight:600;}
.bar-item .row .l .cat{color:#cbd5e1;margin-right:2px;}
.bar-item .row .r{font-weight:700;color:#475569;}
.track{height:10px;background:#f1f5f9;border-radius:99px;overflow:hidden;}
.track .fill{height:100%;border-radius:99px;}
/* budget */
.budget-hero{border-radius:18px;padding:16px;background:#f8fafc;border:2px solid #f1f5f9;margin-bottom:12px;}
.budget-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
.budget-head .label{font-size:12px;color:#94a3b8;font-weight:700;}
.budget-head .value{font-size:24px;color:#475569;font-weight:800;}
.budget-head .remain{text-align:right;font-size:12px;color:#64748b;font-weight:600;}
.budget-head .remain b{display:block;font-size:16px;color:#475569;}
.budget-progress{height:12px;border-radius:99px;background:#e2e8f0;overflow:hidden;}
.budget-progress .fill{height:100%;border-radius:99px;background:#10b981;transition:width .2s;}
.budget-progress .fill.warn{background:#f59e0b;}.budget-progress .fill.over{background:#ef4444;}
.budget-caption{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:#94a3b8;font-weight:600;}
.budget-actions{display:flex;gap:8px;margin-top:12px;}
.budget-actions button{flex:1;min-height:44px;border:2px solid #e2e8f0;background:#fff;color:#64748b;border-radius:14px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.budget-actions .primary{background:#6366f1;border-color:#6366f1;color:#fff;}
.budget-form-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9;}
.budget-form-row .name{flex:1;min-width:0;color:#475569;font-size:14px;font-weight:700;}
.budget-form-row .name span{display:block;color:#94a3b8;font-size:11px;font-weight:500;margin-top:2px;}
.budget-form-row .money{display:flex;align-items:center;width:132px;border:2px solid #e2e8f0;background:#f8fafc;border-radius:12px;padding:0 9px;color:#94a3b8;font-weight:700;}
.budget-form-row input{width:100%;min-width:0;height:40px;border:none;background:none;outline:none;color:#475569;text-align:right;font-size:14px;font-weight:700;font-family:inherit;}
.planning-note{font-size:12px;color:#94a3b8;line-height:1.6;margin:-6px 0 12px;}
.planning-seg{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:#fff;border:2px solid #e2e8f0;border-radius:16px;padding:4px;margin-bottom:16px;}
.planning-seg button{min-height:44px;border:none;background:none;border-radius:12px;color:#94a3b8;font-size:11px;font-weight:800;font-family:inherit;cursor:pointer;}
.planning-seg button.on{background:#6366f1;color:#fff;}
.goal-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px;}
.goal-summary div{background:#f8fafc;border:2px solid #f1f5f9;border-radius:14px;padding:10px 6px;text-align:center;color:#94a3b8;font-size:11px;font-weight:700;}
.goal-summary b{display:block;color:#475569;font-size:14px;margin-top:3px;}
.goal-card{border:2px solid #f1f5f9;border-radius:18px;padding:14px;margin-bottom:10px;}
.goal-card:last-child{margin-bottom:0;}
.goal-title{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
.goal-title .name{min-width:0;color:#475569;font-size:15px;font-weight:800;}
.goal-title .meta{display:block;color:#94a3b8;font-size:11px;font-weight:600;margin-top:3px;}
.goal-status{flex:none;border-radius:99px;background:#ecfdf5;color:#059669;padding:4px 8px;font-size:11px;font-weight:800;}
.goal-status.paused{background:#fffbeb;color:#d97706;}.goal-status.completed{background:#eef2ff;color:#6366f1;}
.goal-money{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;margin-bottom:7px;color:#94a3b8;font-size:11px;font-weight:700;}
.goal-money b{display:block;color:#475569;font-size:18px;}
.goal-advice{background:#f8fafc;border-radius:12px;padding:9px 10px;margin-top:9px;color:#64748b;font-size:12px;line-height:1.5;}
.goal-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:10px;}
.goal-actions button{min-height:44px;border:2px solid #e2e8f0;background:#fff;color:#64748b;border-radius:12px;padding:7px 4px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;}
.goal-actions .primary{background:#6366f1;border-color:#6366f1;color:#fff;}
.project-card{border:2px solid #f1f5f9;border-radius:18px;padding:14px;margin-bottom:10px;}.project-card:last-child{margin-bottom:0;}
.project-card.current{border-color:#c7d2fe;background:#fafaff;}.project-current{display:inline-block;background:#6366f1;color:#fff;border-radius:99px;padding:3px 7px;font-size:10px;font-weight:800;margin-left:5px;}
.project-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:9px 0;}.project-stats div{background:#f8fafc;border-radius:12px;padding:8px 5px;text-align:center;color:#94a3b8;font-size:10px;font-weight:700;}.project-stats b{display:block;color:#475569;font-size:13px;margin-top:2px;}
.project-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:10px;}.project-actions button{min-height:44px;border:2px solid #e2e8f0;background:#fff;color:#64748b;border-radius:12px;padding:7px 4px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;}.project-actions .primary{background:#6366f1;border-color:#6366f1;color:#fff;}
.contribution-summary{background:#eef2ff;border:2px solid #e0e7ff;border-radius:16px;padding:14px;margin-bottom:14px;text-align:center;color:#818cf8;font-size:12px;font-weight:700;}
.contribution-summary b{display:block;color:#4f46e5;font-size:24px;margin-top:3px;}
.contribution-list{display:flex;flex-direction:column;gap:8px;}
.contribution-row{display:flex;align-items:center;gap:9px;border:2px solid #f1f5f9;background:#f8fafc;border-radius:14px;padding:10px;}
.contribution-row .info{flex:1;min-width:0;}.contribution-row .date{color:#475569;font-size:13px;font-weight:800;}.contribution-row .note{color:#94a3b8;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.contribution-row .amount{color:#475569;font-size:14px;font-weight:800;white-space:nowrap;}
.contribution-row button{width:44px;height:44px;flex:none;border:2px solid #e2e8f0;background:#fff;border-radius:12px;color:#64748b;font-size:14px;cursor:pointer;}
.danger-btn{width:100%;min-height:44px;border:none;background:#ef4444;color:#fff;border-radius:16px;padding:12px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;}
.record-action-list{display:grid;grid-template-columns:1fr;gap:8px;}
.record-action-list button{min-height:48px;border:2px solid #e2e8f0;background:#fff;color:#64748b;border-radius:14px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;}
.record-action-list .danger{color:#dc2626;border-color:#fecaca;background:#fef2f2;}
.review-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
.review-summary div{background:#f8fafc;border:2px solid #f1f5f9;border-radius:14px;padding:10px 6px;text-align:center;color:#94a3b8;font-size:11px;font-weight:700;}
.review-summary b{display:block;color:#475569;font-size:14px;margin-top:3px;}.review-summary b.negative{color:#e11d48;}
.review-observations{display:flex;flex-direction:column;gap:7px;}
.review-observation{background:#f8fafc;border-radius:12px;padding:9px 10px;color:#64748b;font-size:12px;line-height:1.5;}
.review-observation.warn{background:#fffbeb;color:#b45309;}
.review-form textarea{width:100%;min-height:76px;resize:vertical;background:#f8fafc;border:2px solid #f1f5f9;border-radius:16px;padding:10px 12px;color:#475569;font-size:14px;line-height:1.5;font-family:inherit;outline:none;}
.review-form textarea:focus{border-color:#c7d2fe;}
.action-input{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.action-input span{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex:none;border-radius:50%;background:#eef2ff;color:#6366f1;font-size:11px;font-weight:800;}
.action-input input{flex:1;min-width:0;min-height:44px;background:#f8fafc;border:2px solid #f1f5f9;border-radius:14px;padding:9px 11px;color:#475569;font-size:13px;font-family:inherit;outline:none;}
.follow-actions{display:flex;flex-direction:column;gap:8px;}
.follow-action{width:100%;min-height:44px;display:flex;align-items:center;gap:9px;text-align:left;border:2px solid #e2e8f0;background:#fff;border-radius:14px;padding:9px 11px;color:#475569;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
.follow-action .check{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex:none;border:2px solid #c7d2fe;border-radius:7px;color:#fff;}
.follow-action.done{color:#94a3b8;text-decoration:line-through;background:#f8fafc;}.follow-action.done .check{background:#6366f1;border-color:#6366f1;text-decoration:none;}
.cashflow-plan{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cashflow-plan div{background:#f8fafc;border-radius:14px;padding:10px;color:#94a3b8;font-size:11px;font-weight:700;}
.cashflow-plan b{display:block;color:#475569;font-size:14px;margin-top:3px;}
/* home calendar */
.calendar-card{padding:16px 10px 10px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin:0 2px 10px;}
.cal-nav .cal-title{text-align:center;color:#475569;}
.cal-nav .cal-title b{display:block;font-size:15px;font-weight:800;}
.cal-nav .cal-title span{display:block;margin-top:2px;color:#94a3b8;font-size:10px;font-weight:700;}
.cal-nav button{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:none;background:#f1f5f9;color:#64748b;border-radius:12px;font-size:17px;font-weight:800;font-family:inherit;cursor:pointer;}
.week{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;margin-bottom:4px;}
.week div{text-align:center;font-size:11px;color:#94a3b8;font-weight:700;padding:3px 0;}
.days{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;}
.day{position:relative;min-width:0;min-height:52px;border:2px solid transparent;border-radius:14px;padding:4px 1px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8fafc;color:#64748b;font-family:inherit;cursor:pointer;}
.day .dn{font-size:12px;font-weight:800;line-height:1.1;}
.day .amt{max-width:100%;margin-top:3px;font-size:9px;font-weight:800;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.day.recorded{background:#eef2ff;color:#4f46e5;border-color:#e0e7ff;}
.day.unrecorded{background:#fffbeb;color:#b45309;border-color:#fef3c7;}
.day.no-spend{background:#ecfdf5;color:#047857;border-color:#d1fae5;}
.day.future{background:#f8fafc;color:#cbd5e1;cursor:default;}
.day.today{border-color:#6366f1;box-shadow:0 0 0 1px #6366f1 inset;}
.day.other-month{opacity:.48;}
.calendar-expand{width:100%;min-height:44px;margin-top:7px;border:none;background:none;color:#818cf8;border-radius:12px;font-size:11px;font-weight:800;font-family:inherit;cursor:pointer;}
.calendar-expand b{display:block;font-size:18px;line-height:11px;letter-spacing:4px;}
.cal-hint{display:flex;justify-content:center;gap:10px;margin-top:7px;font-size:10px;color:#94a3b8;font-weight:600;flex-wrap:wrap;}
.cal-hint span{display:flex;align-items:center;gap:4px;}
.cal-hint .dot.recorded{background:#c7d2fe;}.cal-hint .dot.unrecorded{background:#fde68a;}.cal-hint .dot.no-spend{background:#a7f3d0;}
.day-sheet-total{background:#eef2ff;border:2px solid #e0e7ff;border-radius:16px;padding:12px;margin-bottom:12px;text-align:center;color:#818cf8;font-size:11px;font-weight:700;}
.day-sheet-total b{display:block;color:#4f46e5;font-size:24px;margin-top:2px;}
.drow{width:100%;min-height:44px;display:flex;align-items:center;gap:8px;font-size:14px;padding:4px 0;border:none;background:none;text-align:left;font-family:inherit;}
.drow .ic{padding:6px;border-radius:12px;font-size:14px;line-height:1;}
.drow .amt{margin-left:auto;font-weight:700;}
.tagmini{font-size:10px;padding:2px 6px;border-radius:8px;background:#eef2ff;color:#6366f1;font-weight:700;}
/* list */
.hint{font-size:12px;color:#94a3b8;padding:0 4px;font-weight:500;margin-bottom:12px;}
.filter-card{padding:16px;}
.filter-card h3{margin-bottom:10px;}
.filter-advanced.hidden{display:none;}
.filter-search{display:flex;gap:8px;margin-bottom:12px;}
.filter-search input{flex:1;min-width:0;min-height:45px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:14px;padding:10px 12px;font-size:14px;color:#475569;outline:none;font-family:inherit;}
.filter-search button,.filter-actions button{min-height:44px;border:none;background:#6366f1;color:#fff;border-radius:14px;padding:11px 14px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.filter-field label{display:block;font-size:11px;color:#94a3b8;font-weight:700;margin:0 0 5px 2px;}
.filter-field.wide{grid-column:1/-1;}
.filter-field input,.filter-field select{width:100%;height:44px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:12px;padding:0 9px;color:#475569;font-size:13px;font-weight:600;outline:none;font-family:inherit;}
.filter-dates{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.filter-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;}
.filter-actions .clear{background:#fff;color:#64748b;border:2px solid #e2e8f0;}
.filter-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:0 0 12px;}
.filter-summary div{background:#fff;border:2px solid #f1f5f9;border-radius:14px;padding:9px;text-align:center;color:#94a3b8;font-size:11px;font-weight:600;}
.filter-summary b{display:block;color:#475569;font-size:14px;margin-top:2px;}
.acc{background:#fff;border-radius:24px;border:2px solid #f1f5f9;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:12px;}
.acc-head{width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:none;border:none;cursor:pointer;font-family:inherit;}
.acc-head:hover{background:#f8fafc;}
.acc-head .l{display:flex;align-items:center;gap:8px;font-weight:800;color:#475569;font-size:16px;}
.acc-head .l .c{font-size:12px;font-weight:500;color:#cbd5e1;}
.acc-head .r{text-align:right;font-size:12px;font-weight:700;}
.acc-head .r .in{color:#059669;}.acc-head .r .ex{color:#f43f5e;}
.chev{transition:transform .2s;color:#a5b4fc;font-size:18px;line-height:1;}
.chev.closed{transform:rotate(-90deg);}
.months{padding:0 10px 10px;background:#f8fafc99;border-top:2px solid #f8fafc;}
.macc{background:#fff;border-radius:16px;border:2px solid #f1f5f9;overflow:hidden;margin-top:10px;}
.macc-head{width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:none;border:none;cursor:pointer;font-family:inherit;}
.macc-head:hover{background:#f8fafc;}
.macc-head .l{display:flex;align-items:center;gap:6px;font-weight:700;color:#475569;font-size:14px;}
.macc-head .l .c{font-size:12px;font-weight:500;color:#cbd5e1;}
.macc-head .chev{font-size:15px;color:#94a3b8;}
.items{border-top:2px solid #f8fafc;}
.item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f8fafc;}
.item:last-child{border-bottom:none;}
.item .ic{padding:8px;border-radius:16px;flex-shrink:0;font-size:16px;line-height:1;}
.item .mid{flex:1;min-width:0;}

<script>
/* ============ 数据定义 ============ */
const DEFAULT_EXPENSE_CATS = {
  food:{name:'食品生鲜',emoji:'🥗',color:'#22c55e',subs:{vegetable:'买菜',meat:'买肉',fruit:'水果',snack:'零食',drink:'饮料'}},
  shopping:{name:'购物',emoji:'🛒',color:'#6366f1',subs:{daily:'日用品',clothes:'衣服',sports:'运动器材',digital:'数码电器'}},
  kids:{name:'育儿',emoji:'🧸',color:'#fb7185',subs:{toy:'玩具',kclothes:'衣服',shoes:'鞋子',bedding:'床品',study:'学习文具',kother:'其他'}},
  dining:{name:'餐饮外食',emoji:'🍜',color:'#f59e0b',subs:{restaurant:'堂食',takeout:'外卖'}},
  transport:{name:'交通出行',emoji:'🚌',color:'#0ea5e9',subs:{transit:'公共交通',taxi:'打车',fuel:'加油',charging:'车辆充电',ticket:'车票机票'}},
  living:{name:'居住生活',emoji:'🏠',color:'#8b5cf6',subs:{rent:'房租',utility:'水电燃气',hotel:'住宿酒店'}},
  entertainment:{name:'休闲娱乐',emoji:'🎮',color:'#ec4899',subs:{movie:'影音游戏',scenic:'景点门票',fitness:'健身'}},
  health:{name:'医疗健康',emoji:'💊',color:'#ef4444',subs:{medicine:'药品',checkup:'体检医疗'}},
  social:{name:'人情往来',emoji:'🎁',color:'#f97316',subs:{gift:'礼物红包'}},
};
const BENEFICIARIES={family:'共同',wife:'妻子',husband:'丈夫',son:'儿子'};
const BENEFICIARY_IDS=Object.keys(BENEFICIARIES);
const CATEGORY_COLORS=['#22c55e','#6366f1','#fb7185','#f59e0b','#0ea5e9','#8b5cf6','#ec4899','#ef4444','#f97316','#14b8a6','#64748b'];
function defaultCategoryConfig(){return Object.entries(DEFAULT_EXPENSE_CATS).map(([id,item],index)=>({id,name:item.name,color:item.color||CATEGORY_COLORS[index%CATEGORY_COLORS.length],active:true,subs:Object.entries(item.subs).map(([subId,name])=>({id:subId,name,active:true,roles:[...BENEFICIARY_IDS]}))}));}
function cloneCategoryConfig(config){return JSON.parse(JSON.stringify(config));}
function categoryMap(config){const map={};config.forEach(group=>{const subs={},subConfig={};group.subs.forEach(sub=>{subs[sub.id]=sub.name;subConfig[sub.id]=sub;});map[group.id]={name:group.name,color:group.color,active:group.active!==false,subs,subConfig};});return map;}
let EXPENSE_CATS=categoryMap(defaultCategoryConfig());
const INCOME_CATS = {
  salary:{name:'工资',emoji:'💼',color:'#10b981',subs:{base:'月薪'}},
  bonus:{name:'奖金',emoji:'🏆',color:'#14b8a6',subs:{perf:'绩效奖金'}},
  finance:{name:'理财收益',emoji:'📈',color:'#0ea5e9',subs:{invest:'投资收益'}},
  parttime:{name:'兼职外快',emoji:'🤝',color:'#6366f1',subs:{side:'兼职'}},
  redpacket:{name:'红包礼金',emoji:'🧧',color:'#f59e0b',subs:{gift:'收红包'}},
  other_in:{name:'其他收入',emoji:'🐷',color:'#94a3b8',subs:{misc:'其他'}},
};
const GOAL_TYPES={emergency:{name:'应急储备',emoji:'🛟'},travel:{name:'旅行计划',emoji:'✈️'},education:{name:'教育成长',emoji:'🎓'},debt:{name:'偿还债务',emoji:'🧾'},other:{name:'其他目标',emoji:'🎯'}};
const GOAL_STATUSES={active:'进行中',paused:'已暂停',completed:'已完成'};
const PROJECT_TYPES={travel:{name:'旅行',emoji:'✈️'},renovation:{name:'装修',emoji:'🛠️'},festival:{name:'节日',emoji:'🧧'},medical:{name:'医疗',emoji:'🏥'},education:{name:'教育',emoji:'🎓'},moving:{name:'搬家',emoji:'📦'},other:{name:'其他',emoji:'🧳'}};
const PROJECT_STATUSES={active:'进行中',completed:'已完成',archived:'已归档'};
const getCat=(t,k)=>(t==='income'?INCOME_CATS:EXPENSE_CATS)[k];
const fmt=cents=>(Number(cents)/100).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});
function calendarAmountLabel(cents){
  const yuan=Number(cents)/100;
  if(yuan>=10000)return`${(yuan/10000).toFixed(1).replace(/\.0$/,'')}万`;
  if(yuan>=1000)return`${(yuan/1000).toFixed(1).replace(/\.0$/,'')}k`;
  const decimals=cents%100===0?0:2,text=yuan.toFixed(decimals);
  return decimals?text.replace(/0$/,''):text;
}
function calendarDayTotals(records,year,month){
  const totals={},prefix=`${year}-${String(month+1).padStart(2,'0')}-`;
  records.forEach(record=>{if(record.type==='expense'&&record.date.startsWith(prefix))totals[record.date]=(totals[record.date]||0)+record.amountCents;});
  return totals;
}
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const SCHEMA_VERSION=3;
const BACKUP_VERSION=3;
const PREFS_SCHEMA_VERSION=2;
const DECISIONS_SCHEMA_VERSION=1;
const KEY='myBudgetBook_v2';
const LEGACY_KEY='myBudgetBook_v1';
const META_KEY='myBudgetBook_meta_v1';
const PREFS_KEY='myBudgetBook_prefs_v1';
const DECISIONS_KEY='myBudgetBook_decisions_v1';
let recoveryRaw='',recoveryError='',recoveryDownloaded=false;

function uuid(){
  if(globalThis.crypto&&typeof globalThis.crypto.randomUUID==='function')return globalThis.crypto.randomUUID();
  const bytes=new Uint8Array(16);
  if(globalThis.crypto&&typeof globalThis.crypto.getRandomValues==='function')globalThis.crypto.getRandomValues(bytes);
  else for(let i=0;i<bytes.length;i++)bytes[i]=Math.floor(Math.random()*256);
  bytes[6]=(bytes[6]&15)|64;bytes[8]=(bytes[8]&63)|128;
  const hex=[...bytes].map(b=>b.toString(16).padStart(2,'0'));
  return `${hex.slice(0,4).join('')}-${hex.slice(4,6).join('')}-${hex.slice(6,8).join('')}-${hex.slice(8,10).join('')}-${hex.slice(10).join('')}`;
}
function validDate(s){
  if(!/^\d{4}-\d{2}-\d{2}$/.test(s))return false;
  const[y,m,d]=s.split('-').map(Number),dt=new Date(y,m-1,d);
  return dt.getFullYear()===y&&dt.getMonth()===m-1&&dt.getDate()===d;
}
function normalizeRecord(raw,expenseCats=EXPENSE_CATS){
  if(!raw||typeof raw!=='object')throw new Error('记录不是对象');
  const type=raw.type;
  if(type!=='expense'&&type!=='income')throw new Error('收支类型无效');
  const cats=type==='income'?INCOME_CATS:expenseCats;
  if(!cats[raw.cat]||!Object.prototype.hasOwnProperty.call(cats[raw.cat].subs,raw.sub))throw new Error('分类无效');
  const date=String(raw.date||'');
  if(!validDate(date))throw new Error('日期无效');
  let amountCents;
  if(Number.isInteger(raw.amountCents))amountCents=raw.amountCents;
  else if(Number.isFinite(Number(raw.amount)))amountCents=Math.round(Number(raw.amount)*100);
  if(!Number.isSafeInteger(amountCents)||amountCents<=0)throw new Error('金额无效');
  const nowIso=new Date().toISOString();
  const safeId=typeof raw.id==='string'&&/^[a-zA-Z0-9_-]{1,80}$/.test(raw.id)?raw.id:Number.isSafeInteger(raw.id)&&raw.id>=0?`legacy-${raw.id}`:uuid();
  const createdAt=typeof raw.createdAt==='string'&&Number.isFinite(Date.parse(raw.createdAt))?new Date(raw.createdAt).toISOString():nowIso;
  const updatedAt=typeof raw.updatedAt==='string'&&Number.isFinite(Date.parse(raw.updatedAt))?new Date(raw.updatedAt).toISOString():createdAt;
  const beneficiaryId=type==='expense'&&BENEFICIARY_IDS.includes(raw.beneficiaryId)?raw.beneficiaryId:type==='expense'?'unassigned':'';
  return {id:safeId,type,date,cat:raw.cat,sub:raw.sub,amountCents,
    note:typeof raw.note==='string'?raw.note.trim().slice(0,20):'',tag:type==='expense'&&typeof raw.tag==='string'?raw.tag.trim().slice(0,12):'',projectId:type==='expense'&&validId(raw.projectId)?raw.projectId:'',
    beneficiaryId,
    createdAt,updatedAt};
}
function normalizeRecords(input,expenseCats=EXPENSE_CATS){
  if(!Array.isArray(input))throw new Error('账本记录不是数组');
  const records=[],errors=[],ids=new Set();
  input.forEach((raw,index)=>{try{const record=normalizeRecord(raw,expenseCats);if(ids.has(record.id))record.id=uuid();ids.add(record.id);records.push(record);}catch(error){errors.push(`第 ${index+1} 条：${error.message}`);}});
  return {records,errors};
}
function envelope(records,forExport=false){
  const data={schemaVersion:SCHEMA_VERSION,records};
  return forExport?{...data,appName:'CassieProject',exportedAt:new Date().toISOString(),recordCount:records.length}:data;
}
function backupEnvelope(records,preferences,decisionData){return {appName:'CassieProject',backupVersion:BACKUP_VERSION,schemaVersion:SCHEMA_VERSION,exportedAt:new Date().toISOString(),recordCount:records.length,records,preferences,decisions:decisionData};}
function readStoredData(){
  let raw='';

/* ============ 图表(纯SVG) ============ */
function trendSVG(){
  const arr=Array(12).fill(0);
  state.records.forEach(r=>{const[y,m]=r.date.split('-').map(Number);if(r.type==='expense'&&y===state.year)arr[m-1]+=r.amountCents;});
  const max=Math.max(1,...arr);
  const W=340,H=190,pL=34,pR=10,pT=10,pB=30,cw=W-pL-pR,ch=H-pT-pB,base=pT+ch;
  const X=i=>pL+i*cw/11, Y=v=>base-(v/max)*ch;
  const points=arr.map((value,index)=>`${X(index)},${Y(value)}`).join(' '),area=`M${pL},${base} L${points.split(' ').join(' L')} L${pL+cw},${base} Z`;
  let grid='';for(let g=0;g<=3;g++){const y=pT+ch*g/3;grid+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#f1f5f9" stroke-width="1"/>`;}
  let labels='';arr.forEach((a,i)=>{if(i%2===0)labels+=`<text x="${X(i)}" y="${H-8}" font-size="9" fill="#94a3b8" text-anchor="middle">${i+1}月</text>`;});
  const dots=arr.map((value,index)=>`<circle cx="${X(index)}" cy="${Y(value)}" r="2.5" fill="#6366f1"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="gE" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#818cf8" stop-opacity=".35"/><stop offset="100%" stop-color="#818cf8" stop-opacity="0"/></linearGradient></defs>
    ${grid}<path d="${area}" fill="url(#gE)"/><polyline points="${points}" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}${labels}</svg>`;
}

function dateFromString(value){const[y,m,d]=value.split('-').map(Number);return new Date(y,m-1,d);}
function dateString(date){return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;}
function mondayOfWeek(date){const result=new Date(date);result.setHours(0,0,0,0);result.setDate(result.getDate()-((result.getDay()+6)%7));return result;}

            const beneficiary=!inc?(BENEFICIARIES[r.beneficiaryId]||'未标注'):'';h+=`<div class="item"><div class="mid"><div class="tt">${c.subs[r.sub]}<span class="cat">${c.name}</span>${beneficiary?`<span class="tagmini">${beneficiary}</span>`:''}${scene?`<span class="tagmini">${esc(scene)}</span>`:''}</div><div class="sub">${+r.date.slice(8)}日${r.note?' · '+esc(r.note):''}</div></div><div class="amt ${inc?'in-c':'ex-c'}">${inc?'+':'-'}¥${fmt(r.amountCents)}</div><button class="more" data-action="open-record-actions" data-value="${r.id}" aria-label="${inc?'查看历史收入':'管理这笔支出'}">${inc?'›':'⋯'}</button></div>`;});
          h+=`</div>`;}

/* ============ 交互 ============ */
function setView(v){state.view=v;render();}

function shift(d){if(state.view==='year'){state.year+=d;render();return;}let m=state.month+d,y=state.year;if(m>11){m=0;y++;}if(m<0){m=11;y--;}state.month=m;state.year=y;render();}
function goToday(){const date=new Date();state.view='month';state.year=date.getFullYear();state.month=date.getMonth();state.calendarAnchor=todayStr();render();}

function applyFilters(){
  const keyword=document.getElementById('filterKeyword').value.trim().slice(0,40);

function toggleFilters(){const box=document.querySelector('.filter-advanced'),button=document.querySelector('[data-action="toggle-filters"]'),willOpen=box?box.classList.contains('hidden'):!state.filtersExpanded;state.filtersExpanded=willOpen;if(box)box.classList.toggle('hidden',!willOpen);if(button)button.textContent=willOpen?'收起筛选条件':'更多筛选条件';}

function readBudgetInput(element){
  const raw=element.value.trim();if(!raw)return null;
  if(!/^\d+(?:\.\d{1,2})?$/.test(raw))return false;
  const cents=Math.round(Number(raw)*100);return Number.isSafeInteger(cents)&&cents>0?cents:false;
}
function saveBudget(){
  const availableCents=readBudgetInput(document.getElementById('budgetAvailable')),totalCents=readBudgetInput(document.getElementById('budgetTotal'));
  if(availableCents===false){toast('可支配金额最多保留两位小数');return;}if(totalCents===false){toast('日常预算最多保留两位小数');return;}
  if(availableCents===null&&totalCents===null){toast('请至少填写可支配金额或日常预算');return;}
  const key=monthKey(),old=decisions.budgets[key],nowIso=new Date().toISOString();
  decisions.budgets[key]={totalCents,availableCents,categories:old&&old.categories?old.categories:{},updatedAt:nowIso};
  if(!saveDecisions()){if(old)decisions.budgets[key]=old;else delete decisions.budgets[key];return;}
  render();toast('本月计划已保存');
}
function copyPreviousBudget(){
  const key=monthKey(),source=decisions.budgets[previousMonthKey(key)];if(!source){toast('上月没有可复制的预算');return;}
  const old=decisions.budgets[key];decisions.budgets[key]={totalCents:source.totalCents??null,availableCents:source.availableCents??null,categories:old&&old.categories?old.categories:{},updatedAt:new Date().toISOString()};
  if(!saveDecisions()){if(old)decisions.budgets[key]=old;else delete decisions.budgets[key];return;}
  render();toast('已复制上月计划');
}
function saveReview(){
  const today=new Date(),key=monthKey(),currentKey=monthKey(today.getFullYear(),today.getMonth());if(key>currentKey)return;
  const highlight=document.getElementById('reviewHighlight').value.trim().slice(0,120),old=decisions.reviews[key]||null,adjustment=old?old.adjustment:'',nowIso=new Date().toISOString(),input=document.getElementById('reviewAction'),text=input.value.trim().slice(0,40),actions=old?old.actions.slice(1):[];
  if(text){const previous=old&&old.actions.find(item=>item.id===input.dataset.id);actions.unshift(previous?{...previous,text}:{id:uuid(),text,done:false,createdAt:nowIso,completedAt:''});}

  const first=focusable[0],last=focusable[focusable.length-1];
  if(event.shiftKey&&document.activeElement===first){event.preventDefault();last.focus();}
  else if(!event.shiftKey&&document.activeElement===last){event.preventDefault();first.focus();}
});

render();
if(loaded.notice)setTimeout(()=>toast(loaded.notice),0);
if('serviceWorker' in navigator&&location.protocol!=='file:')window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
